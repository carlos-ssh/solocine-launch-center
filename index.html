<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo Cine - Launch Command Center</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b1120; color: #e2e8f0; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const completed = [
      "Autenticacion completa (JWT + OAuth Google)",
      "Catalogo multi-fuente (TMDB + Drive + IA)",
      "Panel admin premium (Next.js glassmorphism)",
      "Streaming HLS (transcodificacion Sidekiq)",
      "Integracion Google Drive (Service + Sheets)",
      "Asistente IA (Claude + Gemini + OpenAI)",
      "Suscripciones y planes (billing logic)",
      "Background jobs (Sidekiq workers)",
      "CI/CD GitHub Actions (staging + prod)",
      "Infra Docker + Nginx + Cloudflare Tunnel",
      "Auth consolidado: remove next-auth/better-auth (cleanup)",
      "Fix prod: revert session_store (OmniAuth NoSessionError)",
      "Seguridad: eliminados logs que filtraban sesion y tokens",
      "Security OWASP: SQL injection, CSP, rate limiting, login throttle (PR #11)"
    ];
    const blockers = [
      { label: "Payment Gateway (Stripe/MercadoPago)", pts: 18 },
      { label: "Load Testing (k6/locust)", pts: 5 },
      { label: "Backup & Recovery (runbook)", pts: 3 }
    ];
    const phases = [
      { n: 1, name: "Preparacion", weeks: "Sem 1-2", active: true },
      { n: 2, name: "Beta Cerrada", weeks: "Sem 3-4", active: false },
      { n: 3, name: "Launch Prep", weeks: "Sem 5-6", active: false },
      { n: 4, name: "GO-LIVE", weeks: "Sem 7", active: false }
    ];
    const pct = Math.round(completed.length / (completed.length + blockers.length + 4) * 100);
    const card = {background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:16};
    function App() {
      const [tab, setTab] = useState("overview");
      const tabs = ["overview","blockers","roadmap"];
      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0b1120,#0f172a,#130b2b)",color:"#e2e8f0",padding:24}}>
          <div style={{maxWidth:1000,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
              <div style={{width:52,height:52,borderRadius:12,background:"linear-gradient(135deg,#6366f1,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,boxShadow:"0 0 24px #6366f166"}}>🎬</div>
              <div>
                <h1 style={{margin:0,fontSize:"1.6rem",fontWeight:800,background:"linear-gradient(90deg,#818cf8,#c084fc)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Solo Cine - Launch Command Center</h1>
                <p style={{margin:0,color:"#64748b",fontSize:"0.82rem"}}>solocine.lat - Marzo 2026 - En camino al lanzamiento 🚀</p>
              </div>
              <div style={{marginLeft:"auto",textAlign:"center"}}>
                <div style={{fontSize:"2.4rem",fontWeight:800,color:"#6366f1"}}>{pct}%</div>
                <div style={{fontSize:"0.7rem",color:"#64748b"}}>completado</div>
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,0.06)",borderRadius:999,height:8,marginBottom:24}}>
              <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,#6366f1,#a855f7)",borderRadius:999,boxShadow:"0 0 12px #a855f788"}} />
            </div>
            <div style={{display:"flex",gap:8,marginBottom:24}}>
              {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"8px 20px",borderRadius:999,border:tab===t?"1px solid #6366f1":"1px solid rgba(255,255,255,0.1)",background:tab===t?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.04)",color:tab===t?"#a5b4fc":"#94a3b8",cursor:"pointer",fontWeight:tab===t?700:400,fontSize:"0.85rem",textTransform:"capitalize"}}>{t}</button>)}
            </div>
            {tab==="overview"&&<div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:20}}>
                {[{l:"✅ Features",v:completed.length,c:"#10b981"},{l:"🔴 Blockers",v:blockers.length,c:"#ef4444"},{l:"📅 Sprint",v:"1 de 4",c:"#6366f1"},{l:"🚀 Go-Live",v:"~7 sem",c:"#a855f7"}].map(s=><div key={s.l} style={card}><div style={{fontSize:"0.72rem",color:"#64748b"}}>{s.l}</div><div style={{fontSize:"1.8rem",fontWeight:800,color:s.c,marginTop:4}}>{s.v}</div></div>)}
              </div>
              <div style={{...card,padding:20}}>
                <h3 style={{margin:"0 0 16px",color:"#10b981",fontSize:"0.9rem"}}>✅ Features Completadas ({completed.length})</h3>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
                  {completed.map((f,i)=><div key={i} style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:8,padding:"8px 12px",fontSize:"0.82rem",color:"#6ee7b7"}}>✓ {f}</div>)}
                </div>
              </div>
            </div>}
            {tab==="blockers"&&<div style={{...card,borderColor:"rgba(239,68,68,0.3)",padding:20}}>
              <h3 style={{margin:"0 0 4px",color:"#ef4444",fontSize:"0.9rem"}}>🚨 Bloqueadores Criticos - Sin estos NO se lanza</h3>
              <p style={{margin:"0 0 18px",fontSize:"0.78rem",color:"#64748b"}}>Sprint 1 activo - Sem 1-2</p>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {blockers.map((b,i)=><div key={i} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:700,color:"#fca5a5"}}>{b.label}</div>
                  <div style={{fontSize:"0.75rem",background:"rgba(239,68,68,0.15)",color:"#ef4444",padding:"3px 10px",borderRadius:999,whiteSpace:"nowrap"}}>{b.pts} pts</div>
                </div>)}
              </div>
            </div>}
            {tab==="roadmap"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>
              {phases.map(p=><div key={p.n} style={{...card,borderColor:p.active?"rgba(99,102,241,0.5)":"rgba(255,255,255,0.1)",background:p.active?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.04)",position:"relative",padding:20}}>
                {p.active&&<span style={{position:"absolute",top:12,right:12,background:"#6366f1",color:"#fff",fontSize:"0.6rem",fontWeight:700,padding:"2px 8px",borderRadius:999}}>ACTIVO</span>}
                <div style={{fontSize:"2.2rem",marginBottom:10}}>{["🔧","🧪","🎯","🚀"][p.n-1]}</div>
                <div style={{fontWeight:800,color:p.active?"#a5b4fc":"#94a3b8",fontSize:"1rem"}}>FASE {p.n}</div>
                <div style={{fontWeight:600,color:p.active?"#818cf8":"#64748b",marginTop:4}}>{p.name}</div>
                <div style={{fontSize:"0.75rem",color:"#6366f1",marginTop:4}}>{p.weeks}</div>
              </div>)}
            </div>}
            <div style={{marginTop:32,textAlign:"center",color:"#334155",fontSize:"0.7rem",borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:16}}>
              Solo Cine Launch Command Center - solocine.lat - Actualizado: 7 Mar 2026 14:26
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
